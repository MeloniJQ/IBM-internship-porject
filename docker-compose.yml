# =============================================================================
# BudgetHub - Docker Compose
#
# NOTE on architecture: BudgetHub is a single Flask service that renders its
# own HTML templates and serves its own static assets - there is no separate
# frontend container to run. Its database is SQLite, a file-based, in-process
# database (not a client/server service), so it does NOT get its own
# container; instead it lives on a named volume mounted into the app
# container so data survives rebuilds/restarts. The only other external
# dependency is the OpenRouter/Gemini LLM API, which is a managed cloud
# service reached over the network via GEMINI_API_URL - it intentionally
# stays external and is not run as a container.
# =============================================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: budgethub:latest
    container_name: budgethub
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      PORT: 5000
      FLASK_DEBUG: "false"
      DATABASE_URL: sqlite:///budget_tracker.db
      GEMINI_API_URL: ${GEMINI_API_URL:-https://openrouter.ai/api/v1/chat/completions}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemma-4-26b-a4b-it:free}
      GEMINI_SERVER_KEY: ${GEMINI_SERVER_KEY:-}
    env_file:
      # Optional: create a real .env (copied from .env.example) for local
      # secrets; values there override the defaults above. Safe to omit.
      - path: .env
        required: false
    volumes:
      # Persist the SQLite database file across container restarts/rebuilds.
      - budget_data:/app/instance
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/login', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  budget_data:
    driver: local